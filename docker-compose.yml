# ============================================
# Legal-Ops Docker Compose
# ============================================
# Orchestration for frontend, backend, and database services
# For Dokploy deployment

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: legalops-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-law_agent_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-law_agent_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legalops-network

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: legalops-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legalops-network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: legalops-backend
    restart: unless-stopped
    environment:
      # Database
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-law_agent_db}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-law_agent_db}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-changeme}

      # Redis
      REDIS_URL: redis://redis:6379/0

      # LLM Configuration
      LLM_PROVIDER: ${LLM_PROVIDER:-gemini}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-exp:free}

      # Security
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30

      # CORS
      CORS_ORIGINS: ${CORS_ORIGINS:-https://legalops.apexneural.cloud,https://www.legalops.apexneural.cloud,http://localhost:3000,http://127.0.0.1:3000,http://localhost:8006,http://127.0.0.1:8006,http://localhost:8007,http://127.0.0.1:8007}
      CORS_ALLOW_ALL: ${CORS_ALLOW_ALL:-false}
      FRONTEND_URL: ${FRONTEND_URL:-https://legalops.apexneural.cloud}

      # Server
      BACKEND_PORT: ${BACKEND_PORT:-8091}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PORT: ${BACKEND_PORT:-8091}

      # OCR
      OCR_ENGINE: auto
      OCR_LANGUAGES: eng+msa

      # PayPal (optional)
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}

      # Playwright
      PLAYWRIGHT_BROWSERS_PATH: /app/pw-browsers

      # SendGrid (optional)
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@example.com}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    ports:
      - "${BACKEND_PORT:-8091}:${BACKEND_PORT:-8091}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:${BACKEND_PORT:-8091}/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - legalops-network

  # Next.js Frontend with Nginx
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://legalops-api.apexneural.cloud}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://legalops.apexneural.cloud}
    container_name: legalops-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # Public URL for client-side fetches (Browser -> Backend Public URL)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://legalops-api.apexneural.cloud}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://legalops.apexneural.cloud}
      # Internal URL for SSR fetches (Next.js Node Server -> Backend Docker Container)
      INTERNAL_API_URL: http://backend:8091
      BACKEND_URL: http://backend:8091
      PORT: ${FRONTEND_PORT:-8006}
    ports:
      - "${FRONTEND_PORT:-8006}:8006"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3001/" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - legalops-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local

networks:
  legalops-network:
    driver: bridge
